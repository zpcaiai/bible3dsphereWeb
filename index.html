    <script src="/js/lang-init.js"></script>

    <!-- 首屏启动占位（React 挂载后自动替换），避免重型 3D 包加载期间白屏 -->
    <style id="boot-splash-style">
      #boot-splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:radial-gradient(120% 120% at 50% 40%,#161126 0%,#0a0d18 70%);color:#eef1ff;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",Roboto,sans-serif;z-index:9999}
      #boot-splash .ring{width:56px;height:56px;border-radius:50%;border:3px solid rgba(109,124,255,.25);border-top-color:#8b5cf6;animation:boot-spin .9s linear infinite}
      #boot-splash .name{font-size:20px;font-weight:700;letter-spacing:.14em}
      #boot-splash .sub{font-size:12.5px;color:rgba(219,226,255,.55);letter-spacing:.06em}
      html[lang="en"] .lang-zh{display:none}
      html:not([lang="en"]) .lang-en{display:none}
      @keyframes boot-spin{to{transform:rotate(360deg)}}
      @media (prefers-reduced-motion: reduce){#boot-splash .ring{animation:none;border-top-color:#8b5cf6}}
    </style>
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root">
      <div id="boot-splash" role="status" aria-live="polite">
        <div class="ring"></div>
        <div class="name"><span class="lang-zh">属灵星球</span><span class="lang-en">Soul Planet</span></div>
        <div class="sub"><span class="lang-zh">载入中…</span><span class="lang-en">Loading…</span></div>
      </div>
    </div>
    <noscript>
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#0a0d18;color:#eef1ff;font-family:sans-serif;text-align:center;line-height:1.7">
        Please enable JavaScript to use Soul Planet (holiness.uk).
      </div>
    </noscript>
  </body>
