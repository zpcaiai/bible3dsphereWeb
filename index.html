<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6d7cff" />
    <script>
      // 清理旧版 Service Worker（仅在检测到旧版本时执行一次）
      (function() {
        var CACHE_KEY = 'emotion-sphere-cache-cleared-v1';
        if (localStorage.getItem(CACHE_KEY)) return; // 已清理过，不再执行
        
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            var hasOldSW = regs.some(function(r) {
              return r.scope && r.scope.includes(window.location.hostname) && 
                     r.active && !r.active.scriptURL.includes('emotion-sphere-2025');
            });
            if (hasOldSW) {
              regs.forEach(function(r) {
                if (r.scope && r.scope.includes(window.location.hostname)) {
                  r.unregister();
                }
              });
              // 清理缓存
              if ('caches' in window) {
                caches.keys().then(function(names) {
                  names.forEach(function(name) { caches.delete(name); });
                });
              }
              localStorage.setItem(CACHE_KEY, 'true');
              // 软刷新一次以应用清理
              window.location.reload();
            }
          });
        }
        localStorage.setItem(CACHE_KEY, 'true'); // 标记已执行
      })();
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EmotionSphere" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <title>属灵星球 · 属灵感知与陪伴</title>
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
