<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="属灵星球">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161126"/>
      <stop offset="1" stop-color="#0a0d18"/>
    </linearGradient>
    <radialGradient id="sphere" cx="50%" cy="44%" r="60%">
      <stop offset="0" stop-color="#6d7cff" stop-opacity="0.60"/>
      <stop offset="48%" stop-color="#5b3fae" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#1a1433" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cross" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#5ac8fa"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="11" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#bg)"/>

  <!-- sphere (属灵星球) -->
  <circle cx="256" cy="250" r="170" fill="url(#sphere)"/>
  <circle cx="256" cy="250" r="150" fill="none" stroke="#6d7cff" stroke-opacity="0.30" stroke-width="2"/>

  <!-- tilted orbit -->
  <ellipse cx="256" cy="258" rx="202" ry="76" fill="none" stroke="#5ac8fa" stroke-opacity="0.30" stroke-width="3" transform="rotate(-24 256 258)"/>

  <!-- stars -->
  <circle cx="122" cy="150" r="3"   fill="#dbe2ff" opacity="0.85"/>
  <circle cx="398" cy="168" r="2.4" fill="#dbe2ff" opacity="0.70"/>
  <circle cx="392" cy="372" r="3"   fill="#dbe2ff" opacity="0.60"/>
  <circle cx="132" cy="368" r="2.2" fill="#dbe2ff" opacity="0.55"/>

  <!-- luminous Latin cross -->
  <g filter="url(#glow)" fill="url(#cross)">
    <rect x="233" y="118" width="46" height="286" rx="18"/>
    <rect x="180" y="196" width="152" height="46" rx="18"/>
  </g>
</svg>
